spring.application.name=sb_ecom
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

project.image=${PROJECT_IMAGE_DIR}

spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=${JWT_EXPIRATION_MS}
spring.ecom.app.jwtCookieName=${JWT_COOKIE_NAME}

logging.level.org.springframework=${LOGGING_LEVEL_SPRINGFRAMEWORK}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL}
logging.level.org.springframework.security=${LOGGING_LEVEL_SPRING_SECURITY}
logging.level.com.ecommerce.sb_ecom=${LOGGING_LEVEL_ECOMMERCE}