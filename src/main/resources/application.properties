spring.application.name=sb_ecom

# Database configuration using environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT configuration using environment variables
spring.app.jwtSecret=${JWT_SECRET}
spring.app.jwtExpirationMs=${JWT_EXPIRATION_MS}
spring.ecom.app.jwtCookieName=${JWT_COOKIE_NAME}

# Logging levels using environment variables
logging.level.org.springframework=${LOGGING_LEVEL_SPRINGFRAMEWORK}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL}
logging.level.org.springframework.security=${LOGGING_LEVEL_SPRING_SECURITY}
logging.level.com.ecommerce.ecom=${LOGGING_LEVEL_ECOMMERCE}

# Project image directory
project.image=${PROJECT_IMAGE_DIR}